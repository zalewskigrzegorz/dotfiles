# Sesh: fuzzy tmux session manager
# https://github.com/joshmedeski/sesh
#
# startup_command removed 2026-05-23 — sesh sends it via `tmux send-keys`,
# which leaves the literal bash invocation visible in terminal scrollback
# as if the user typed it. Window naming is now handled by the
# tmux-nerd-font-window-name plugin (automatic-rename-format) which is silent.

[default_session]

# Public, non-secret project
[[session]]
name = "dotfiles"
path = "~/Code/dotfiles"

# NOTE: Other projects (e.g. redocly) are discovered dynamically via
# zoxide history. Do not hardcode private project names here.
