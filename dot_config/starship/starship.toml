command_timeout = 2000
palette = "mocha-neon"

format = """
$hostname\
${custom.mac_host}\
$directory\
${custom.repo_on}\
$git_branch\
$git_commit\
$git_state\
$git_status\
${custom.worktree}\
${custom.via}\
$nodejs\
$bun\
$deno\
$python\
$rust\
$golang\
$lua\
$java\
$ruby\
$php\
$c\
$cmake\
$dotnet\
$docker_context\
$kubernetes\
$terraform\
$package\
${custom.claude_sessions}\
$line_break\
$character
"""

right_format = """
$cmd_duration\
$jobs\
$time\
"""

[palettes.mocha-neon]
bg          = "#1E1E2E"
fg          = "#F0F0FF"
fg_muted    = "#A6ADC8"
mauve       = "#B347FF"
pink        = "#FF80BF"
lavender    = "#9580FF"
green       = "#50FA7B"
gold        = "#FFD700"
red         = "#FF6B9D"
cyan        = "#8BE9FD"
orange      = "#FF8C42"
surface     = "#313244"

[character]
success_symbol = "[­¤”ä](pink)"
error_symbol   = "[­¤Ü©](red)"

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "

[git_branch]
symbol = "ŅéĀ "
format = "[$symbol$branch]($style) "
style  = "bold cyan"
# truncation_length disabled ŌĆö long branch names cut mid-name are unreadable.
# starship can only truncate from the END (showing prefix + ŌĆ”), which loses the
# ticket-id / meaningful suffix. Full branch is more useful than a cut prefix.

[git_status]
# Trailing space inside each glyph keeps icons from colliding when several
# statuses fire at once; empty values contribute nothing.
format = '([$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind]($style))'
conflicted = "[’ü▒](red) "
stashed    = "[’Ć«](mauve) "
deleted    = "[’Ćö](red) "
renamed    = "[Ō×ö](pink) "
modified   = "[’äæ](gold) "
staged     = "[+](green) "
untracked  = "’ä© "
ahead      = "[’é¬](green) "
behind     = "[’é½](red) "
diverged   = "[’ĆĪ](orange) "
up_to_date = ""
style      = "bold pink"

[git_commit]
# Surface short SHA only on detached HEAD (bisect / `git checkout <tag>` /
# `git checkout <sha>`). Stays invisible while on a branch.
only_detached       = true
commit_hash_length  = 7
format              = "[ $hash$tag]($style) "
style               = "bold gold"
tag_disabled        = false

[git_state]
# Surface REBASING / MERGING / CHERRY-PICKING / BISECTING / AM / REVERTING.
# Common during worktree workflows (parallel rebases, conflict resolution).
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style  = "bold mauve"
rebase           = "REBASING"
merge            = "MERGING"
revert           = "REVERTING"
cherry_pick      = "CHERRY-PICKING"
bisect           = "BISECTING"
am               = "AM"
am_or_rebase     = "AM/REBASE"

[hostname]
ssh_only = true
format   = "[$ssh_symbol$hostname]($style) "
ssh_symbol = "’é® "
style    = "bold gold"

[custom.mac_host]
when     = """ test -z "$SSH_TTY" """
command  = "echo ’ģ╣ mac"
format   = "[$output]($style) "
style    = "bold pink"
shell    = ["sh"]

[custom.repo_on]
when    = "git rev-parse --is-inside-work-tree"
command = "echo on"
format  = "[$output ]($style)"
style   = "fg_muted"
shell   = ["sh"]

[custom.worktree]
# Show ŌÄć <worktree-name> only when cwd is a git worktree (not the main
# checkout). Detection: in a worktree the per-tree `git-dir` lives under
# `<common>/.git/worktrees/<name>`, so `git-common-dir != git-dir`.
# `basename "$(git rev-parse --git-dir)"` yields the worktree name.
when    = """ test "$(git rev-parse --git-common-dir 2>/dev/null)" != "$(git rev-parse --git-dir 2>/dev/null)" """
command = "basename \"$(git rev-parse --git-dir 2>/dev/null)\""
format  = "[ŌÄć $output ]($style)"
style   = "bold orange"
shell   = ["sh"]

[custom.via]
when    = "ls package.json Cargo.toml go.mod pyproject.toml requirements.txt setup.py Gemfile pom.xml build.gradle composer.json deno.json bun.lockb 2>/dev/null | grep -q ."
command = "echo via"
format  = "[$output ]($style)"
style   = "fg_muted"
shell   = ["sh"]

[nodejs]
symbol = "Ņ£ś "
format = "[$symbol($version )]($style)"
style  = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[bun]
symbol = "ŅØ» "
format = "[$symbol($version )]($style)"
style  = "bold gold"

[deno]
symbol = "Ņś© "
format = "[$symbol($version )]($style)"
style  = "bold green"

[python]
symbol = "Ņśå "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style  = "bold gold"

[rust]
symbol = "Ņ×© "
format = "[$symbol($version )]($style)"
style  = "bold orange"

[golang]
symbol = "Ņś” "
format = "[$symbol($version )]($style)"
style  = "bold cyan"

[lua]
symbol = "ŅśĀ "
format = "[$symbol($version )]($style)"
style  = "bold lavender"

[java]
symbol = "Ņ£Ė "
format = "[$symbol($version )]($style)"
style  = "bold red"

[ruby]
symbol = "Ņ×æ "
format = "[$symbol($version )]($style)"
style  = "bold red"

[php]
symbol = "Ņśł "
format = "[$symbol($version )]($style)"
style  = "bold lavender"

[c]
symbol = "Ņś× "
format = "[$symbol($version )]($style)"
style  = "bold cyan"

[cmake]
symbol = "ŅśØ "
format = "[$symbol($version )]($style)"
style  = "bold mauve"

[dotnet]
symbol = "ŅØ┐ "
format = "[$symbol($version )]($style)"
style  = "bold mauve"

[docker_context]
symbol = "’īł "
format = "[$symbol$context]($style) "
style  = "bold cyan"
only_with_files = true

[kubernetes]
disabled = true
symbol = "ŌśĖ "
format = '[$symbol$context( \($namespace\))]($style) '
style  = "bold lavender"

[terraform]
symbol = "’å╗ "
format = "[$symbol$workspace]($style) "
style  = "bold mauve"

[package]
symbol = "’Æć "
format = "[$symbol$version]($style) "
style  = "bold gold"
disabled = false

[custom.claude_sessions]
command  = "claude-sessions count 2>/dev/null"
when     = """ test -n "$SSH_TTY" && test "$(claude-sessions count 2>/dev/null)" -gt 0 2>/dev/null """
format   = "[’āü $output]($style) "
style    = "bold green"
shell    = ["sh"]

[cmd_duration]
min_time = 500
style    = "bold gold"
format   = "[’ēÆ $duration]($style) "

[jobs]
symbol = "’Ćō "
style  = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[time]
disabled = true

[aws]
disabled = true

[profiles]
transient = "$character"
