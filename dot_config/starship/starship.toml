command_timeout = 2000
palette = "mocha-neon"

format = """
$hostname\
${custom.mac_host}\
$directory\
${custom.repo_on}\
$git_branch\
$git_status\
${custom.via}\
$nodejs\
$bun\
$deno\
$python\
$rust\
$golang\
$lua\
$java\
$ruby\
$php\
$c\
$cmake\
$dotnet\
$docker_context\
$kubernetes\
$terraform\
$package\
${custom.claude_sessions}\
$line_break\
$character
"""

right_format = """
$cmd_duration\
$jobs\
$time\
"""

[palettes.mocha-neon]
bg          = "#1E1E2E"
fg          = "#F0F0FF"
fg_muted    = "#A6ADC8"
mauve       = "#B347FF"
pink        = "#FF80BF"
lavender    = "#9580FF"
green       = "#50FA7B"
gold        = "#FFD700"
red         = "#FF6B9D"
cyan        = "#8BE9FD"
orange      = "#FF8C42"
surface     = "#313244"

[character]
success_symbol = "[🦄](pink)"
error_symbol   = "[🚨](red)"

[directory]
style = "bold lavender"
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style  = "bold cyan"
# truncation_length disabled — long branch names cut mid-name are unreadable.
# starship can only truncate from the END (showing prefix + …), which loses the
# ticket-id / meaningful suffix. Full branch is more useful than a cut prefix.

[git_status]
format = '([$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind]($style) )'
conflicted = "[](red)"
stashed    = "[](mauve)"
deleted    = "[](red)"
renamed    = "[➔](pink)"
modified   = "[](gold)"
staged     = "[+](green)"
untracked  = ""
ahead      = "[](green) "
behind     = "[](red) "
diverged   = "[](orange) "
up_to_date = ""
style      = "bold pink"

[hostname]
ssh_only = true
format   = "[$ssh_symbol$hostname]($style) "
ssh_symbol = " "
style    = "bold gold"

[custom.mac_host]
when     = """ test -z "$SSH_TTY" """
command  = "echo  mac"
format   = "[$output]($style) "
style    = "bold pink"
shell    = ["sh"]

[custom.repo_on]
when    = "git rev-parse --is-inside-work-tree"
command = "echo on"
format  = "[$output ]($style)"
style   = "fg_muted"
shell   = ["sh"]

[custom.via]
when    = "ls package.json Cargo.toml go.mod pyproject.toml requirements.txt setup.py Gemfile pom.xml build.gradle composer.json deno.json bun.lockb 2>/dev/null | grep -q ."
command = "echo via"
format  = "[$output ]($style)"
style   = "fg_muted"
shell   = ["sh"]

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold green"
detect_files = ["package.json", ".node-version", ".nvmrc"]
detect_folders = ["node_modules"]

[bun]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold gold"

[deno]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold green"

[python]
symbol = " "
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style  = "bold gold"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold orange"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold cyan"

[lua]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold lavender"

[java]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold red"

[ruby]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold red"

[php]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold lavender"

[c]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold cyan"

[cmake]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold mauve"

[dotnet]
symbol = " "
format = "[$symbol($version )]($style)"
style  = "bold mauve"

[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style  = "bold cyan"
only_with_files = true

[kubernetes]
disabled = true
symbol = "☸ "
format = '[$symbol$context( \($namespace\))]($style) '
style  = "bold lavender"

[terraform]
symbol = " "
format = "[$symbol$workspace]($style) "
style  = "bold mauve"

[package]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold gold"
disabled = false

[custom.claude_sessions]
command  = "claude-sessions count 2>/dev/null"
when     = """ test -n "$SSH_TTY" && test "$(claude-sessions count 2>/dev/null)" -gt 0 2>/dev/null """
format   = "[ $output]($style) "
style    = "bold green"
shell    = ["sh"]

[cmd_duration]
min_time = 500
style    = "bold gold"
format   = "[ $duration]($style) "

[jobs]
symbol = " "
style  = "bold red"
number_threshold = 1
format = "[$symbol]($style)"

[time]
disabled = true

[aws]
disabled = true

[profiles]
transient = "$character"
