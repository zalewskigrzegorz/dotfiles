command_timeout = 1000
palette = "mocha-neon"

[palettes.mocha-neon]
bg          = "#1E1E2E"
fg          = "#F0F0FF"
fg_muted    = "#A6ADC8"
mauve       = "#B347FF"
pink        = "#FF80BF"
lavender    = "#9580FF"
green       = "#50FA7B"
gold        = "#FFD700"
red         = "#FF6B9D"
cyan        = "#8BE9FD"
orange      = "#FF8C42"
surface     = "#313244"

format = """
$hostname\
$custom.mac_host\
$directory\
$git_branch\
$git_status\
$custom.mise\
$custom.claude_sessions\
$line_break\
$character
"""

right_format = """
$cmd_duration\
$jobs\
$time\
"""

[character]
success_symbol = "[󱷁](pink)"
error_symbol   = "[🚨](red)"

[directory]
style = "lavender"
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = ""  # nf-pl-branch U+E0A0 — clean powerline branch
format = "[$symbol $branch]($style) "
style  = "cyan"
truncation_length = 20

[git_status]
format = '([$conflicted$stashed$deleted$renamed$modified$staged$untracked$ahead_behind]($style) )'
conflicted = "[](red)"
stashed    = "[](mauve)"
deleted    = "[](red)"
renamed    = "[➜](pink)"
modified   = "[](gold)"
staged     = "[+](green)"
untracked  = ""
ahead      = "[](green) "
behind     = "[](red) "
diverged   = "[](orange) "
up_to_date = ""
style      = "pink"

[nodejs]
disabled = true

[hostname]
ssh_only = true
format   = "[$ssh_symbol$hostname]($style) "
ssh_symbol = "󰂩 "
style    = "bold gold"

[custom.mac_host]
when     = """ test -z "$SSH_TTY" """
command  = "echo  mac"
format   = "[$output]($style) "
style    = "bold pink"

[custom.mise]
command = "mise current 2>/dev/null | awk 'NR<=3 {printf \"%s@%s \", $1, $2} END {if (NR > 3) printf \"+%d\", NR-3}'"
when = "mise current 2>/dev/null | grep -q ."
format = "[ $output]($style) "
style = "bold gold"

[custom.claude_sessions]
command  = "claude-sessions count 2>/dev/null"
when     = """ test "$(claude-sessions count 2>/dev/null)" -gt 0 2>/dev/null """
format   = "[🔗 $output]($style) "
style    = "bold green"

[cmd_duration]
min_time = 500
style    = "gold"
format   = "[$duration]($style) "

[jobs]
symbol = ' '
style  = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[time]
disabled = true

[kubernetes]
disabled = true

[aws]
disabled = true
