[metadata]
name = "nomad"
description = "Select Nomad jobs"
requirements = ["nomad", "jq"]

[source]
command = "bash -c 'nomad job status -namespace \"*\" -json 2>/dev/null | jq -r \".[] | \\\"\\(.Namespace)/\\(.ID)\\\"\" || echo \"\"'"

[preview]
command = "bash -c 'sel=\"{}\"; ns=\"${sel%%/*}\"; id=\"${sel#*/}\"; nomad job status -namespace \"$ns\" \"$id\" 2>/dev/null || echo \"Job details not available\"'" 