[metadata]
name = "sesh"
description = "Select sesh sessions (tmux + configs + zoxide combined)"
requirements = ["sesh"]

[source]
# No `-i` (icons) — TV doesn't parse the ANSI codes that sesh emits with -i,
# so they'd render as literal `[34m[39m` garbage. Plain `sesh list` is clean
# and sesh connect accepts both session names and bare paths.
command = "sesh list"

[preview]
command = "bash -c 'p={}; if [ -d \"${p/#~/$HOME}\" ]; then eza -la --color=always --icons \"${p/#~/$HOME}\" 2>/dev/null | head -40; else tmux list-windows -t \"$p\" -F \"#{window_index}: #{window_name} (#{pane_current_path})\" 2>/dev/null; fi'"

[ui.preview_panel]
size = 50

