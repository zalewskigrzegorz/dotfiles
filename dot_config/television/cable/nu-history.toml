
[metadata]
name = "nu-history"
description = "A channel to select from your nu history"

[source]
command = "bash -lc 'PATH=\"$HOME/.cargo/bin:/home/linuxbrew/.linuxbrew/bin:/opt/homebrew/bin:/usr/local/bin:$PATH\"; nu \"$HOME/.config/television/cable/nu-history-source.nu\" </dev/null'"
display = "{}"
output = "{}"
no_sort = true
frecency = false
