# Nushell-specific environment fix
set-option -g update-environment "DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY PATH NU_LIB_DIRS NU_PLUGIN_DIRS"

# True-color support (24-bit RGB) for Mocha Neon palette
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Tc'
set -as terminal-features ',xterm-ghostty:RGB'

# Plan token limits for usage-pct helper.
# Calibrated 2026-05-23 to match /usage TUI ratio (ccusage counts raw tokens;
# Anthropic weights by model price + plan, hence drift). Re-calibrate when
# /usage and tmux chips diverge by >5pp: bump limit so (raw_used / limit) ≈
# (anthropic_pct / 100). Live API scrape blocked by Cloudflare JA3 — parking
# until Anthropic ships official usage API.
set-environment -g CLAUDE_SESSION_TOKEN_LIMIT "320000000"
set-environment -g CLAUDE_WEEKLY_TOKEN_LIMIT "1400000000"

# Run Nushell in panes (your preferred shell)
set-option -g default-command "exec nu"

# NOTE: Some tmux plugins expect a POSIX shell (bash/sh). Keep plugin commands explicit.
# We do that by using `bash -lc` in @fzf-url-open below.

# Change prefix from ctrl-b to alt+ctrl+v that my super on dygma 
set -g prefix ' '
unbind C-b
bind-key ' ' send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Split panes using | and - (with current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Increase scrollback buffer size
# Set to 500000 to handle very long integration test outputs
# This allows copy-mode search to find content far back in history
set -g history-limit 500000

# Faster command sequences (important for neovim)
set -s escape-time 0
set -g repeat-time 300

# Refresh status line every 10 seconds (performance optimized)
set -g status-interval 10

# Focus events enabled for terminals that support them (important for neovim)
set -g focus-events on

# Easy config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "󱗃 XDG tmux.conf reloaded!"

# STATUS BAR ON TOP
set -g status-position top

# TPM Plugin Manager (must be first)
set -g @plugin 'tmux-plugins/tpm'

# Plugins
set -g @plugin 'tmux-plugins/tmux-sensible' # Sensible defaults
set -g @plugin 'tmux-plugins/tmux-copycat'       # Search with prefix + /
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'  # Visual indicator
set -g @plugin 'jaclu/tmux-menus'               # Interactive menus
# set -g @plugin 'dracula/tmux'  # disabled — Mocha Neon takes over
set -g @plugin 'christoomey/vim-tmux-navigator' # Better pane navigation (vim-like)
set -g @plugin 'Peter-McKinney/tmux-fzf-open-files-nvim'
# tmux-fzf-open-files-nvim usage:
# prefix + F: Extract file paths from visible pane output, open in neovim with fzf
# prefix + H: Extract file paths from entire current pane history
# prefix + G: Extract file paths from all panes history in window (can be slow)
# Usage: Run command showing file paths (git status, ls, grep), press prefix+F/H/G, select files in fzf
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
# Icons + labels come from automatic-rename-format (set by the nerd-font plugin).
setw -g automatic-rename on
# tmux-resurrect + tmux-continuum — re-enabled 2026-06-04 with safe defaults
# after auto-launch was permanently removed (shared "init-time tmux ops under
# load" failure surface gone). Auto-restore flipped ON 2026-06-04 after manual
# restore verified working. Config:
#   - @continuum-save-interval '15'   → background save every 15 min (harmless).
#   - @continuum-restore 'on'         → auto-restore on tmux server start.
#   - @resurrect-processes 'false'    → restore sessions/windows/panes/cwd,
#                                       but DON'T re-run commands. Avoids the
#                                       feedback loop with zz-tmux-window-wrappers
#                                       (which respawns TUIs on command-name match).
#                                       Panes come back as bare nu prompts —
#                                       claude/nvim/lazygit must be re-launched
#                                       manually (intentional trade-off).
#   - @resurrect-capture-pane-contents 'on' → snapshot last screen for context.
# Manual restore: prefix Ctrl-R. Manual save: prefix Ctrl-S.
# Spec (full crash-mode history):
#   ~/Code/personal/bazgroly/dotfiles/specs/2026-05-24-tmux-auto-launch-and-resurrect-disabled.md
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'false'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# OSC52 clipboard pass-through.
# Lets apps inside tmux (claude code, nvim, etc.) set the outer
# terminal's clipboard — critical on remote sessions over SSH where
# we have no pbcopy on the host. Ghostty has clipboard-write = allow,
# so Cmd+V on mac pastes whatever the remote app copied.
set -g set-clipboard on
set -g allow-passthrough on

# tmux-yank settings (macOS clipboard)
# Usage:
# - In copy-mode: 'y' copies selection, 'Y' copies entire line
# - After tmux-copycat search: 'y' copies selected result
# - Works with both mouse selection and keyboard selection
set -g @yank_selection 'clipboard'
set -g @yank_selection_mouse 'clipboard'
# set -g @dracula-git-no-repo-message "❌"  # disabled — Mocha Neon takes over
# set -g @dracula-git-disable-status true  # disabled — Mocha Neon takes over
# set -g @dracula-git-show-remote-status false  # disabled — Mocha Neon takes over
# set -g @dracula-uptime-colors "pink dark_gray"  # disabled — Mocha Neon takes over
# set -g @dracula-cwd-colors "cyan dark_gray"  # disabled — Mocha Neon takes over
# set -g @dracula-git-colors "orange dark_gray"  # disabled — Mocha Neon takes over

# Neovim-friendly settings
set -g @prefix_highlight_empty_has_affixes 'on'
# set -g @prefix_highlight_empty_prompt '⭐'  # disabled — Mocha Neon takes over

# Better pane navigation (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-like keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Sesh: fuzzy session picker (prefix + f) — multi-tab + ^d kill.
# Script lives at ~/Code/dotfiles/bin/sesh-picker (on PATH via env.nu).
bind-key "f" run-shell "sesh-picker"

# Sesh: jump to last sesh session (prefix + S). `L` is taken by Mocha Legend.
bind-key "S" run-shell "sesh last"

# Copy mode improvements (vim-like)
# NOTE: tmux-yank plugin handles 'y' and 'Y' bindings for clipboard
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi r send -X rectangle-toggle

# tmux-yank usage (replaces pbcopy binding above):
# In copy-mode:
#   - 'y' - copy selected text to clipboard
#   - 'Y' - copy entire line to clipboard
# After tmux-copycat search (prefix + /):
#   - 'y' - copy selected search result to clipboard
# Works seamlessly with macOS clipboard (pbcopy)

# Navi cheatsheet config - FIXED: Use 'b' key as you wanted
bind-key -N "Open Navi (cheat sheets)" b split-window -l 20 \
  'selected=$(navi --print); tmux send-keys -t {last} "$selected"'

# Mocha Neon status bar (replaces dracula/tmux)
set -g status-style "bg=#1E1E2E,fg=#F0F0FF"
set -g status-left-length 80
set -g status-right-length 200

set -g status-left "#[bg=#{?client_prefix,##FFD700,#{?#{==:#{host_short},minis},##FFB86C,##B347FF}},fg=#1E1E2E,bold]  #{?client_prefix,󱓈 ,󱗃 }#{s|/Users/.*/tree/wt-[^/]*/|/|:session_name} #[bg=#8BE9FD,fg=#{?client_prefix,##FFD700,#{?#{==:#{host_short},minis},##FFB86C,##B347FF}}]#[fg=#1E1E2E,bold] @#(hostname | cut -d. -f1) #[bg=#1E1E2E,fg=#8BE9FD]  "
# status-right chips, left → right:
#   ♪ now-playing  (alert-only weather)  󱎫 session %  󰸗 week %
# tmux-now-playing + tmux-weather emit complete #[…] chips (or empty when
# nothing playing / no weather alert) so we don't surround them with bg here.
# Zero gap between chips — adjacent coloured bricks, neon-style.
set -g status-right "#(~/Code/dotfiles/bin/work-status-chip)#(~/Code/dotfiles/bin/tmux-now-playing)#(~/Code/dotfiles/bin/tmux-weather)#[bg=#(~/Code/dotfiles/bin/usage-bg session),fg=#1E1E2E,bold] 󱎫 #(~/Code/dotfiles/bin/usage-bar session) #(~/Code/dotfiles/bin/usage-pct session)%% #[bg=#(~/Code/dotfiles/bin/usage-bg week),fg=#1E1E2E,bold] 󰸗 #(~/Code/dotfiles/bin/usage-bar week) #(~/Code/dotfiles/bin/usage-pct week)%% #[bg=#1E1E2E]"

# Windows: lavender default, mauve active, append  if a waiting Claude is in this tmux session
setw -g window-status-format "#[fg=#9580FF,bg=#1E1E2E] #I:#W "
setw -g window-status-current-format "#[fg=#B347FF,bg=#1E1E2E]#[bg=#B347FF,fg=#1E1E2E,bold] #I:#W#{?#(/Users/greg/Code/dotfiles/bin/claude-waiting-count \"#S\"),#[fg=#FF6B9D] !,} #[fg=#B347FF,bg=#1E1E2E] "
set -g window-status-separator "#[fg=#585B70,bg=#1E1E2E] │ "

# Prefix highlight (Mocha Neon)
set -g @prefix_highlight_fg '#1E1E2E'
set -g @prefix_highlight_bg '#B347FF'
set -g @prefix_highlight_empty_prompt '󱗃'


# prefix + L: show Mocha Neon status bar legend
bind-key L display-popup -E -w 70 -h 18 -T " Mocha Neon Legend " "bash -c 'cat <<EOF
LEFT  (status-left):
  🦄 SESSION       tmux session name (gold when prefix active)
  󰂩 HOST           SSH host / local machine name

RIGHT (status-right):
  session ▰▰▰▱▱ N%  token bar + % of session limit (ccusage)
  week    ▰▱▱▱▱ N%  token bar + % of weekly Opus limit

WINDOWS:
  active = mauve chip with chevron arrows
EOF
echo
read -rsp \"Press enter to close...\"'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Overrides MUST sit after TPM, otherwise plugin bindings clobber ours.
# Prefix + u: pick a URL from the current pane using fzf popup and open it in the browser.
# Uses our bash script (not the plugin's fzf-url.rb) for nu/quoting compatibility.
unbind-key -T prefix u
bind-key -T prefix u run-shell -b 'bash -lc "~/.config/tmux/fzf-url-picker.sh"'

# Prefix + F/H/G: replace tmux-fzf-open-files-nvim's broken open-in-current-window flow.
# Our script reuses the plugin's path parser, shows fzf popup, then spawns a NEW tmux
# window with nvim — matching the nu `_tui_window` wrapper (icon + automatic-rename off,
# focus switched to the new window). See dot_config/tmux/open-file-window.sh.
unbind-key -T prefix F
unbind-key -T prefix H
unbind-key -T prefix G
bind-key -T prefix F run-shell 'bash -lc "~/.config/tmux/open-file-window.sh visible"'
bind-key -T prefix H run-shell 'bash -lc "~/.config/tmux/open-file-window.sh history"'
bind-key -T prefix G run-shell 'bash -lc "~/.config/tmux/open-file-window.sh all"'

# Prefix + ?: searchable fzf-tmux popup over `tmux list-keys`. Default binding
# (static `list-keys -N`) replaced with interactive search. Zero maintenance —
# always reflects current bindings. See dot_config/tmux/keys-search.sh.
unbind-key -T prefix ?
bind-key -T prefix ? run-shell 'bash -lc "~/.config/tmux/keys-search.sh"'

