# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
# esc = clean exit from service mode (no reload-config, no sketchybar reload).
# Reload is on 'r' (flatten-workspace-tree). Accidental ctrl-shift-space → esc
# should just dismiss the skull, not rebuild the world.
esc = ['mode main', 'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service']
# Re-pressing the entry shortcut also toggles out of service mode.
ctrl-shift-space = ['mode main', 'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service']
r = [
  'flatten-workspace-tree',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
] # reset layout
f = [
  'layout floating tiling',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
] # Toggle between floating and tiling layout
backspace = [
  'close-all-windows-but-current',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
t = [
  'mode terminal',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
m = [
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
a = [
  'exec-and-forget nu ~/.config/aerospace/reset-apps.nu',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
b = [
  'exec-and-forget nu ~/.config/aerospace/rebuild-watcher.nu',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
x = ['exec-and-forget nu ~/.config/aerospace/restart.nu']

ctrl-shift-h = [
  'join-with left',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
ctrl-shift-j = [
  'join-with down',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
ctrl-shift-k = [
  'join-with up',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]
ctrl-shift-l = [
  'join-with right',
  'mode main',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event leave_service',
]

# Automation when windows open

# Catch-all: notify watcher every time a window is detected, then continue
# with the per-app placement rules below. Fixes the "open new window doesn't
# update sketchybar until focus changes" gap (handleEvent: "window-changed").
[[on-window-detected]]
check-further-callbacks = true
