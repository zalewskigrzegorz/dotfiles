# Place a copy of this config to ~/.aerospace.toml
# After that, you can edit ~/.aerospace.toml to your liking

# You can use it to add commands that run after login to macOS user session.
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
# Available commands: https://nikitabobko.github.io/AeroSpace/commands
after-login-command = []

# You can use it to add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands

after-startup-command = [
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher >> $HOME/Code/dotfiles/logs/sketchybar-watcher.log 2>&1',
  'exec-and-forget /opt/homebrew/bin/borders >> $HOME/Code/dotfiles/logs/borders.log 2>&1',
]

# Start AeroSpace at login
start-at-login = true

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  '$HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event workspace FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE FOCUSED_DISPLAY=$(aerospace list-monitors --focused | awk "{print $1}")',
]

# Notify watcher about focus change (watcher updates sketchybar)
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
on-focus-changed = [
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event focus FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 10

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
# Fallback value (if you omit the key): on-focused-monitor-changed = []
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# You can effectively turn off macOS "Hide application" (cmd-h) feature by toggling this flag
# Useful if you don't use this macOS feature, but accidentally hit cmd-h or cmd-alt-h key
# Also see: https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
automatically-unhide-macos-hidden-apps = false

# Possible values: (qwerty|dvorak|colemak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
[key-mapping]
preset = 'qwerty'

# monitor force strategy
[workspace-to-monitor-force-assignment]
# Core workspaces on whichever external is connected (Dell vs Samsung swap often).
# Patterns are tried in order; first substring match against list-monitors wins.
# Run: aerospace list-monitors  — add another string here if you get a new display name.
# Keys 1–5 → Dell first; 6–9 → ultrawide first. Second pattern = fallback when only one external.
chat = ['DELL U3225QE', 'C34H89x']
term = ['DELL U3225QE', 'C34H89x']
code = ['DELL U3225QE', 'C34H89x']
misc = ['DELL U3225QE', 'C34H89x']
notes = ['DELL U3225QE', 'C34H89x']
web = ['C34H89x', 'DELL U3225QE']
media = ['C34H89x', 'DELL U3225QE']
test = ['C34H89x', 'DELL U3225QE']
mail = ['C34H89x', 'DELL U3225QE']
mac = 'Built-in'

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See:
#                 https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 5
outer.bottom = 5
# outer.top — gap from screen TOP edge to workspace area (NOT from sketchybar
# bottom). macOS reserves ~32 px above the workspace for menubar/notch, so the
# perceived gap below the bar = outer.top + (macOS reserved area - bar.height).
# Sketchybar has sticky=on so it always overlays windows; tested 2026-05-23
# that outer.top = 4 produces no window/bar collision because the workspace
# area is already below the menubar zone.
#
# Monitor pattern: aerospace does substring match, so "Built-in" matches the
# actual MacBook display name "Built-in Retina Display".
outer.top = [
  { monitor."Built-in"     = 4 },
  { monitor.'DELL U3225QE' = 4 },
  { monitor.'C34H89x'      = 4 },
  4,
]
outer.right = 5

# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
# Fallback value (if you omit the key): mode.main.binding = {}
[mode.main.binding]

# Layout controls
ctrl-slash = 'layout tiles horizontal vertical'
ctrl-comma = 'layout accordion horizontal vertical'

# full screen
ctrl-f = 'macos-native-fullscreen'
# Focus controls
ctrl-h = 'focus left'
ctrl-j = 'focus down'
ctrl-k = 'focus up'
ctrl-l = 'focus right'

# Move controls
ctrl-shift-h = 'move left'
ctrl-shift-j = 'move down'
ctrl-shift-k = 'move up'
ctrl-shift-l = 'move right'

# Resize controls
ctrl-minus = 'resize smart -50'
ctrl-equal = 'resize smart +50'

# Workspace switching (1–5 Dell-side, 6–9 ultrawide, 0 built-in)
ctrl-1 = 'workspace chat'
ctrl-2 = 'workspace term'
ctrl-3 = 'workspace code'
ctrl-4 = 'workspace misc'
ctrl-5 = 'workspace notes'
ctrl-6 = 'workspace web'
ctrl-7 = 'workspace media'
ctrl-8 = 'workspace test'
ctrl-9 = 'workspace mail'
ctrl-0 = 'workspace mac'

# Move to workspace
ctrl-shift-1 = 'move-node-to-workspace chat'
ctrl-shift-2 = 'move-node-to-workspace term'
ctrl-shift-3 = 'move-node-to-workspace code'
ctrl-shift-4 = 'move-node-to-workspace misc'
ctrl-shift-5 = 'move-node-to-workspace notes'
ctrl-shift-6 = 'move-node-to-workspace web'
ctrl-shift-7 = 'move-node-to-workspace media'
ctrl-shift-8 = 'move-node-to-workspace test'
ctrl-shift-9 = 'move-node-to-workspace mail'
ctrl-shift-0 = 'move-node-to-workspace mac'

ctrl-alt-b = 'exec-and-forget $HOME/Code/dotfiles/bin/aerospace-flip-window/aerospace-flip-window'

# Jump to workspace of the most recent notification (written by sketchybar-watcher).
ctrl-n = 'exec-and-forget $HOME/Code/dotfiles/bin/aerospace-jump-to-notif'

# Other controls
ctrl-tab = 'workspace-back-and-forth'
ctrl-shift-tab = 'move-workspace-to-monitor --wrap-around next'
ctrl-shift-space = [
  'mode service',
  'exec-and-forget $HOME/Code/dotfiles/bin/sketchybar-watcher/sketchybar-watcher notify --event enter_service',
]


