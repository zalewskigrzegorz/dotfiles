# hunk — review-first TUI diff viewer (modem-dev/hunk)
# Target: ~/.config/hunk/config.toml  (managed by chezmoi: dot_config/hunk/)
#
# Theme = Mocha Neon. Inherits catppuccin-mocha for everything, then overrides
# the FOREGROUND chrome (accents, sign/badge/file-status colors, borders, agent
# notes, syntax) with Mocha Neon neon hex. Background fills (*Bg) are left to the
# base so they stay subtle — neon hex as a fill would be unreadable.
# Palette SOT: ~/Code/dotfiles/docs/mocha-neon-palette.md

mode         = "auto"      # auto | split | stack
vcs          = "git"
line_numbers = true
wrap_lines   = false
hunk_headers = true
agent_notes  = true        # inline agent rationale beside code — the whole point
watch        = false       # opt-in per-invocation (git review / --watch)
theme        = "custom"

[custom_theme]
base    = "catppuccin-mocha"

# Core chrome
accent  = "#B347FF"   # mauve — primary accent (matches statusline/tmux/borders)
text    = "#F0F0FF"   # text
border  = "#B347FF"   # mauve — focused-border convention

# Diff signs (foreground only; addedBg/removedBg stay base = subtle dark tints)
addedSignColor   = "#50FA7B"   # green
removedSignColor = "#FF6B9D"   # red

# Badges
badgeAdded   = "#50FA7B"   # green
badgeRemoved = "#FF6B9D"   # red
badgeNeutral = "#9580FF"   # lavender

# File-status colors in the sidebar
fileNew       = "#50FA7B"   # green
fileModified  = "#FFD700"   # gold
fileDeleted   = "#FF6B9D"   # red
fileRenamed   = "#8BE9FD"   # sky
fileUntracked = "#7F849C"   # overlay

# Agent notes
noteBorder    = "#B347FF"   # mauve
noteTitleText = "#FF80BF"   # pink (= alerts/notes semantic in Mocha Neon)

[custom_theme.syntax]
keyword  = "#B347FF"   # mauve
string   = "#50FA7B"   # green
function = "#8BE9FD"   # sky
type     = "#9580FF"   # lavender
number   = "#FF8C42"   # peach
constant = "#FF8C42"   # peach
property = "#FF80BF"   # pink
operator = "#FF80BF"   # pink
variable = "#F0F0FF"   # text
comment  = "#7F849C"   # overlay (kept muted)
