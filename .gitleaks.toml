title = "dotfiles gitleaks config"

[extend]
useDefault = true

[[rules]]
id = "grafana-service-account-token"
description = "Grafana service account token"
regex = '''glsa_[A-Za-z0-9_-]{20,}'''
keywords = ["glsa_"]

[[rules]]
id = "project-update-dump"
description = "Local work status dump should not be committed"
path = '''(^|/)project-update\.md$|(^|/)statuses/'''

[[rules]]
id = "sk-underscore-api-key"
description = "Generic sk_-prefixed API key (e.g. IDE extension keys)"
regex = '''sk_[A-Za-z0-9+/=_-]{30,}'''
keywords = ["sk_"]

[allowlist]
paths = [
  '''^docs/dotfiles-inventory\.md$''',
  '''^dot_gitconfig\.tmpl$''',
]
# GPG public-key fingerprints are not secrets — they're derived from public keys
# and published on keyservers / GitHub commit metadata. Allow them anywhere.
regexes = [
  '''signingKey = [A-F0-9]{40}''',
]
